<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitarn Vidya - Study Notes</title>
    <meta name="description" content="Comprehensive study materials for engineering students">
    <script defer src="https://vitarn-analytics.jnwn.xyz/script.js" data-website-id="24ae2874-c479-4404-82a5-c2f96e88294c"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vitarn-black: #0a0a0a;
            --vitarn-blue: #2563eb;
            --vitarn-gray: #f5f5f5;
            --vitarn-border: #e5e5e5;
            --vitarn-text: #171717;
            --vitarn-text-light: #737373;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            color: var(--vitarn-text);
            min-height: 100vh;
        }

        .vitarn-grid {
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--vitarn-border);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--vitarn-black);
            text-decoration: none;
        }

        .logo span {
            color: var(--vitarn-blue);
        }

        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: calc(100vh - 64px);
        }

        /* Search and Filters */
        .search-section {
            margin-bottom: 2rem;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid var(--vitarn-border);
            background: var(--vitarn-gray);
            transition: all 0.2s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--vitarn-black);
            background: white;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 2px solid var(--vitarn-border);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            border-color: var(--vitarn-black);
        }

        .filter-chip.active {
            background: var(--vitarn-black);
            color: white;
            border-color: var(--vitarn-black);
        }

        /* Subjects Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .subject-card {
            background: white;
            border: 2px solid var(--vitarn-border);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .subject-card:hover {
            border-color: var(--vitarn-black);
            box-shadow: 4px 4px 0 0 var(--vitarn-black);
            transform: translate(-2px, -2px);
        }

        .subject-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .subject-meta {
            font-size: 0.75rem;
            color: var(--vitarn-text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Notes Viewer */
        .notes-viewer {
            display: none;
        }

        .notes-viewer.active {
            display: block;
        }

        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--vitarn-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .notes-title {
            font-size: 1.875rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .back-btn {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 2px solid var(--vitarn-border);
            background: transparent;
            color: var(--vitarn-black);
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--vitarn-black);
            color: white;
        }

        .notes-content {
            max-width: 900px;
            line-height: 1.6;
            color: #24292f;
        }

        .notes-content h1 {
            font-size: 2em;
            font-weight: 600;
            margin: 24px 0 16px;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--vitarn-border);
        }

        .notes-content h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin: 24px 0 16px;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--vitarn-border);
        }

        .notes-content h3 {
            font-size: 1.25em;
            font-weight: 600;
            margin: 24px 0 16px;
        }

        .notes-content h4 {
            font-size: 1em;
            font-weight: 600;
            margin: 24px 0 16px;
        }

        .notes-content h5 {
            font-size: 0.875em;
            font-weight: 600;
            margin: 24px 0 16px;
        }

        .notes-content h6 {
            font-size: 0.85em;
            font-weight: 600;
            margin: 24px 0 16px;
            color: var(--vitarn-text-light);
        }

        .notes-content p {
            margin: 0 0 16px;
        }

        .notes-content ul, .notes-content ol {
            margin: 0 0 16px;
            padding-left: 2em;
        }

        .notes-content li {
            margin: 0.25em 0;
        }

        .notes-content li > p {
            margin-top: 16px;
        }

        .notes-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(175, 184, 193, 0.2);
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        .notes-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #0d1117;
            border-radius: 6px;
            margin: 0 0 16px;
        }

        .notes-content pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }

        .notes-content blockquote {
            padding: 0 1em;
            color: var(--vitarn-text-light);
            border-left: 0.25em solid var(--vitarn-border);
            margin: 0 0 16px;
        }

        .notes-content blockquote > :first-child {
            margin-top: 0;
        }

        .notes-content blockquote > :last-child {
            margin-bottom: 0;
        }

        .notes-content table {
            border-spacing: 0;
            border-collapse: collapse;
            display: block;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            margin: 0 0 16px;
        }

        .notes-content table th {
            font-weight: 600;
            background-color: var(--vitarn-gray);
        }

        .notes-content table th, .notes-content table td {
            padding: 6px 13px;
            border: 1px solid var(--vitarn-border);
        }

        .notes-content table tr {
            background-color: white;
            border-top: 1px solid var(--vitarn-border);
        }

        .notes-content table tr:nth-child(2n) {
            background-color: var(--vitarn-gray);
        }

        .notes-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--vitarn-border);
            border: 0;
        }

        .notes-content img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: white;
        }

        .notes-content a {
            color: var(--vitarn-blue);
            text-decoration: none;
        }

        .notes-content a:hover {
            text-decoration: underline;
        }

        .notes-content strong {
            font-weight: 600;
        }

        /* Ad Space */
        .ad-space {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--vitarn-gray);
            border: 2px solid var(--vitarn-border);
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-label {
            font-size: 0.625rem;
            color: var(--vitarn-text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem 1rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--vitarn-border);
            border-top-color: var(--vitarn-black);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }

            .main {
                padding: 1.5rem 1rem;
            }

            .subjects-grid {
                grid-template-columns: 1fr;
            }

            .notes-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notes-content {
                font-size: 0.95rem;
                padding: 0 0.5rem;
            }

            .notes-content h1 {
                font-size: 1.5rem;
            }

            .notes-content h2 {
                font-size: 1.25rem;
            }

            .notes-content h3 {
                font-size: 1.125rem;
            }

            .notes-content h4 {
                font-size: 1rem;
            }

            .notes-content pre {
                padding: 0.75rem;
                overflow-x: auto;
                font-size: 0.875rem;
            }

            .notes-content code {
                font-size: 0.875rem;
            }

            .notes-content table {
                font-size: 0.875rem;
            }

            .notes-content th,
            .notes-content td {
                padding: 0.5rem;
            }

            .filter-chip {
                padding: 0.4rem 0.75rem;
                font-size: 0.8125rem;
            }

            .search-bar {
                padding: 0.875rem 1rem;
                font-size: 0.95rem;
            }

            .back-btn {
                padding: 0.4rem 0.875rem;
                font-size: 0.6875rem;
            }

            .ad-space {
                padding: 1rem;
                margin: 1.5rem 0;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 0 0.75rem;
            }

            .main {
                padding: 1rem 0.75rem;
            }

            .notes-title {
                font-size: 1.5rem;
            }

            .notes-content {
                font-size: 0.9rem;
            }

            .notes-content h1 {
                font-size: 1.375rem;
            }

            .notes-content h2 {
                font-size: 1.125rem;
            }

            .notes-content h3 {
                font-size: 1rem;
            }

            .filter-chip {
                padding: 0.375rem 0.625rem;
                font-size: 0.75rem;
            }

            .search-bar {
                padding: 0.75rem 0.875rem;
                font-size: 0.9rem;
            }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo" onclick="showHome()">VITARN<span>VIDYA</span></a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main vitarn-grid">
        <!-- Home Page -->
        <div id="home-page">
            <div class="search-section">
                <input type="text" class="search-bar" id="search-input" placeholder="Search subjects...">
                <div class="filters" id="filters">
                    <button class="filter-chip active" data-filter="all">All</button>
                    <button class="filter-chip" data-filter="CSM-4-2">CSM 4-2</button>
                </div>
            </div>
            <div class="subjects-grid" id="subjects-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Notes Viewer -->
        <div id="notes-viewer" class="notes-viewer">
            <div class="notes-header">
                <div>
                    <button class="back-btn" onclick="showHome()">← Back</button>
                    <h1 class="notes-title" id="notes-title">Notes Title</h1>
                </div>
            </div>
            <div class="notes-content" id="notes-content">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            <!-- Ad Space -->
            <div class="ad-space">
                <div class="ad-label">Advertisement</div>
                <div id="ad-container-1"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
