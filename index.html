<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitarn Vidya - Study Notes</title>
    <meta name="description" content="Comprehensive study materials for engineering students">
    <script defer src="https://vitarn-analytics.jnwn.xyz/script.js" data-website-id="24ae2874-c479-4404-82a5-c2f96e88294c"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vitarn-black: #0a0a0a;
            --vitarn-blue: #2563eb;
            --vitarn-gray: #f5f5f5;
            --vitarn-border: #e5e5e5;
            --vitarn-text: #171717;
            --vitarn-text-light: #737373;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            color: var(--vitarn-text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--vitarn-border);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--vitarn-black);
            text-decoration: none;
        }

        .logo span {
            color: var(--vitarn-blue);
        }

        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            min-height: calc(100vh - 64px);
        }

        /* Search and Filters */
        .search-section {
            margin-bottom: 2rem;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid var(--vitarn-border);
            border-radius: 8px;
            background: var(--vitarn-gray);
            transition: all 0.2s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--vitarn-black);
            background: white;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            border: 2px solid var(--vitarn-border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            border-color: var(--vitarn-black);
        }

        .filter-chip.active {
            background: var(--vitarn-black);
            color: white;
            border-color: var(--vitarn-black);
        }

        /* Subjects Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .subject-card {
            background: white;
            border: 2px solid var(--vitarn-border);
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .subject-card:hover {
            border-color: var(--vitarn-black);
            box-shadow: 4px 4px 0 0 var(--vitarn-black);
            transform: translate(-2px, -2px);
        }

        .subject-name {
            font-size: 1.125rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .subject-meta {
            font-size: 0.75rem;
            color: var(--vitarn-text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Notes Viewer */
        .notes-viewer {
            display: none;
        }

        .notes-viewer.active {
            display: block;
        }

        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--vitarn-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .notes-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .back-btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 700;
            border: 2px solid var(--vitarn-border);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--vitarn-black);
            background: var(--vitarn-gray);
        }

        .notes-content {
            max-width: 800px;
            line-height: 1.8;
        }

        .notes-content h1 {
            font-size: 2rem;
            font-weight: 900;
            margin: 2rem 0 1rem;
        }

        .notes-content h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 1.5rem 0 0.75rem;
        }

        .notes-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 1.25rem 0 0.5rem;
        }

        .notes-content h4 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
        }

        .notes-content p {
            margin-bottom: 1rem;
            color: var(--vitarn-text);
        }

        .notes-content ul, .notes-content ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .notes-content li {
            margin-bottom: 0.5rem;
        }

        .notes-content code {
            background: var(--vitarn-gray);
            padding: 0.125rem 0.375rem;
            font-family: monospace;
            font-size: 0.875rem;
            border-radius: 4px;
        }

        .notes-content pre {
            background: var(--vitarn-gray);
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            border-radius: 8px;
        }

        .notes-content pre code {
            background: none;
            padding: 0;
        }

        .notes-content blockquote {
            border-left: 4px solid var(--vitarn-blue);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--vitarn-text-light);
        }

        .notes-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .notes-content th, .notes-content td {
            border: 1px solid var(--vitarn-border);
            padding: 0.75rem;
            text-align: left;
        }

        .notes-content th {
            background: var(--vitarn-gray);
            font-weight: 700;
        }

        /* Ad Space */
        .ad-space {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--vitarn-gray);
            border: 1px solid var(--vitarn-border);
            border-radius: 8px;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-label {
            font-size: 0.625rem;
            color: var(--vitarn-text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem 1rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--vitarn-border);
            border-top-color: var(--vitarn-black);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0.75rem 0.75rem;
            }

            .main {
                padding: 1rem 0.75rem;
            }

            .subjects-grid {
                grid-template-columns: 1fr;
            }

            .notes-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notes-content {
                font-size: 0.95rem;
            }

            .notes-content h1 {
                font-size: 1.5rem;
            }

            .notes-content h2 {
                font-size: 1.25rem;
            }

            .notes-content h3 {
                font-size: 1.125rem;
            }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo" onclick="showHome()">VITARN<span>VIDYA</span></a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Home Page -->
        <div id="home-page">
            <div class="search-section">
                <input type="text" class="search-bar" id="search-input" placeholder="Search subjects...">
                <div class="filters" id="filters">
                    <button class="filter-chip active" data-filter="all">All</button>
                    <button class="filter-chip" data-filter="CSM-4-2">CSM 4-2</button>
                </div>
            </div>
            <div class="subjects-grid" id="subjects-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Notes Viewer -->
        <div id="notes-viewer" class="notes-viewer">
            <div class="notes-header">
                <div>
                    <button class="back-btn" onclick="showHome()">← Back</button>
                    <h1 class="notes-title" id="notes-title">Notes Title</h1>
                </div>
            </div>
            <div class="notes-content" id="notes-content">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            <!-- Ad Space -->
            <div class="ad-space">
                <div class="ad-label">Advertisement</div>
                <div id="ad-container-1"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
